<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="TrabaGE — Donde las oportunidades te encuentran" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico?v=20260704" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/trabage-icon-16.png?v=20260704" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/trabage-icon-32.png?v=20260704" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/trabage-icon-48.png?v=20260704" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=20260704" />
    <link rel="shortcut icon" type="image/png" href="/icons/trabage-icon-32.png?v=20260704" />
    <meta name="apple-mobile-web-app-title" content="TrabaGE" />
    <meta name="application-name" content="TrabaGE" />
    <title>TrabaGE</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('trabage_theme') === 'dark' ? 'dark' : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#0F172A' : '#2563EB');
        } catch {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
